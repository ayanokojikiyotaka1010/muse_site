<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>お問い合わせ | エクセレントラウンジ ミューズ．女神</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Allura&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<header class="site-header">
  <a class="logo" href="index.html">
    <img src="images/logo-small.png" alt="ロゴ" class="logo-icon">
    <span>エクセレントラウンジ ミューズ．女神</span>
  </a>

  <nav class="nav">
    <a href="about.html" data-turn>店舗情報</a>
    <a href="recruit.html" data-turn>リクルート</a>
    <a class="btn-contact" href="contact.html" data-turn>お問い合わせ</a>
  </nav>
</header>

  <!-- パンくず -->
  <nav class="breadcrumb" aria-label="パンくず">
    <a href="index.html">HOME</a><span>›</span><span>お問い合わせ</span>
  </nav>

  <!-- Contact（背景＋白カード＋2カラム） -->
  <section class="section section-soft contact-page">
    <h2 class="section-title-en center-text">Contact</h2>
    <h3 class="section-title-ja center-text">・お問い合わせ</h3>

    <div class="contact-grid">
      <!-- 電話 -->
      <div class="contact-box">
        <h4>お電話でのお問い合わせ</h4>
        <a class="outline-btn" href="tel:09065097757">
          <span class="btn-icon" aria-hidden="true">☎</span>
          090-6509-7757
        </a>
        <p class="contact-note">受付時間：19:30〜23:30</p>
        <p class="contact-note">定休日：日・祝</p>
      </div>

      <!-- フォーム -->
      <div class="contact-box">
        <h4>フォームでのお問い合わせ</h4>

        <!-- ★Formspree：YOUR_FORM_ID を差し替え -->
        <form class="contact-form"
              action="https://formspree.io/f/xbdavlda"
              method="POST">

          <label class="form-field">
            <span class="form-label">お名前<span class="req">必須</span></span>
            <input type="text" name="name" required autocomplete="name">
          </label>

          <label class="form-field">
            <span class="form-label">メールアドレス<span class="req">必須</span></span>
            <input type="email" name="email" required autocomplete="email">
          </label>

          <label class="form-field">
            <span class="form-label">お問い合わせ内容<span class="req">必須</span></span>
            <textarea name="message" rows="6" required></textarea>
          </label>

          <!-- 返信用件名を整えたい場合（任意） -->
          <input type="hidden" name="_subject" value="【お問い合わせ】エクセレントラウンジ ミューズ．女神">

          <button class="outline-btn form-submit" type="submit">
            <span class="btn-icon" aria-hidden="true">✉</span>
            送信する
          </button>

          <p class="form-privacy">
            ※内容を確認のうえ、担当よりご連絡いたします。
          </p>
        </form>
      </div>
    </div>
  </section>

</body>
</html>
